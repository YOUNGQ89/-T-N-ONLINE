<!DOCTYPE html>
<html>
<head>
    <title>Shop của Hoàng</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: orange;
            color: white;
            padding: 15px;
            font-size: 24px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product {
            background: white;
            width: 200px;
            margin: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: orange;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
        }

        #cart {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>🛒CHẠY ĐƠN ONLINE </header>

<div id="cart">
    🛍️ Giỏ hàng: <span id="count">0</span>
</div>

<div class="container">

    <div class="product">
        <img src="https://i.imgur.com/abc123.jpg">
        <h3>Áo đẹp</h3>
        <p>199k</p>
        <button onclick="add()">Mua</button>
    </div>

    <div class="product">
        <img src="https://i.imgur.com/abc123.jpg">
        <h3>Giày xịn</h3>
        <p>499k</p>
        <button onclick="add()">Mua</button>
    </div>

    <div class="product">
        <img src="https://i.imgur.com/abc123.jpg">
        <h3>Nón cool</h3>
        <p>99k</p>
        <button onclick="add()">Mua</button>
    </div>
    <a href="https://zalo.me/yourid">
        <button>Mua</button>
    </a>

</div>

<script>
let count = 0;

function add() {
    count++;
    document.getElementById("count").innerText = count;
}
</script>

</body>
</html>

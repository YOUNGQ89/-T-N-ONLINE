<!DOCTYPE html>
<html>
<head>
    <title>CHẠY ĐƠN SHOPEE</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        header { background: orange; color: white; padding: 15px; text-align: center; }
        .top-btn { position: absolute; right: 20px; top: 15px; }
        .balance { margin-top: 5px; }
        button { padding: 8px; border: none; border-radius: 5px; cursor: pointer; }
        .container { display: flex; justify-content: center; flex-wrap: wrap; }
        .product { background: white; width: 220px; margin: 15px; padding: 15px; border-radius: 10px; text-align: center; }
        .popup { display: none; position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.6); top: 0; left: 0; }
        .popup-content { background: white; width: 300px; margin: 100px auto; padding: 20px; border-radius: 10px; text-align: center; }
        input { width: 90%; padding: 8px; margin: 5px; }
        img { width: 200px; }
    </style>
</head>

<body>

<header>
    💰CHẠY ĐƠN SHOPEE
    <div class="balance">Số dư: <span id="balance">0</span> VNĐ</div>
    <div class="top-btn">
        <button onclick="showLogin()">Đăng nhập</button>
    </div>
</header>

<div class="container">
    <div class="product">
        <h3>Đơn 100K</h3>
        <p>Hoa hồng: 600K</p>
        <button onclick="buy('Đơn 100K',600000)">Mua</button>
    </div>

    <div class="product">
        <h3>Đơn 200K</h3>
        <p>Hoa hồng: 1.000K</p>
        <button onclick="buy('Đơn 200K',1000000)">Mua</button>
    </div>

    <div class="product">
        <h3>Đơn 500K</h3>
        <p>Hoa hồng: 2.000K</p>
        <button onclick="buy('Đơn 500K',2000000)">Mua</button>
    </div>
</div>

<!-- QR -->
<div class="popup" id="qr">
    <div class="popup-content">
        <h3>Quét mã thanh toán</h3>
        <img src="https://via.placeholder.com/200">
        <p id="nd"></p>
        <button onclick="closeQR()">Đóng</button>
    </div>
</div>

<!-- Login -->
<div class="popup" id="login">
    <div class="popup-content">
        <h3>Đăng nhập</h3>
        <input id="user" placeholder="Email">
        <input id="pass" type="password" placeholder="Mật khẩu">
        <button onclick="login()">Đăng nhập</button>
        <p onclick="showRegister()" style="color:blue;cursor:pointer">Chưa có tài khoản?</p>
    </div>
</div>

<!-- Register -->
<div class="popup" id="register">
    <div class="popup-content">
        <h3>Đăng ký</h3>
        <input id="newuser" placeholder="Email">
        <input id="newpass" type="password" placeholder="Mật khẩu">
        <button onclick="register()">Đăng ký</button>
    </div>
</div>

<!-- JS THƯỜNG (để onclick chạy) -->
<script>
let balance = localStorage.getItem("balance") || 0;
document.getElementById("balance").innerText = balance;

function buy(product, money){
    document.getElementById("qr").style.display="block";
    document.getElementById("nd").innerText="Nội dung: " + product;

    balance = parseInt(balance) + money;
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
}

function closeQR(){ document.getElementById("qr").style.display="none"; }
function showLogin(){ document.getElementById("login").style.display="block"; }
function showRegister(){
    document.getElementById("login").style.display="none";
    document.getElementById("register").style.display="block";
}

window.register = function(){
    let email = document.getElementById("newuser").value;
    let pass = document.getElementById("newpass").value;

    createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
        alert("Đăng ký OK 🔥");
        document.getElementById("register").style.display="none";
    })
    .catch(err => alert(err.message));
}
window.login = function(){
    let email = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
        alert("Login OK 😎");
        document.getElementById("login").style.display="none";
    })
    .catch(err => alert(err.message));
}
}
</script>

console.log("🔥 Firebase OK");
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth(app);
    import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(app);
    async function saveBalance(uid, money){
    await setDoc(doc(db, "users", uid), {
        balance: money
    });
}
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

onAuthStateChanged(auth, async (user) => {
    if(user){
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if(docSnap.exists()){
            balance = docSnap.data().balance;
            document.getElementById("balance").innerText = balance;
        }
    }
});
</script>

</body>
</html>

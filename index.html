<!DOCTYPE html>
<html>
<head>
    <title>CHẠY ĐƠN ONLINE</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: orange;
            color: white;
            padding: 15px;
            font-size: 24px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .popup-content {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 200px;
        }
    </style>
</head>

<body>

<header>💰CHẠY ĐƠN ONLINE</header>

<div class="container">

    <div class="product">
        <h3>Đơn 100K</h3>
        <p>Hoa hồng: 600K</p>
        <button onclick="showQR('Đơn 100K')">Mua</button>
    </div>

    <div class="product">
        <h3>Đơn 200K</h3>
        <p>Hoa hồng: 1.000K</p>
        <button onclick="showQR('Đơn 200K')">Mua</button>
    </div>

    <div class="product">
        <h3>Đơn 500K</h3>
        <p>Hoa hồng: 2.000K</p>
        <button onclick="showQR('Đơn 500K')">Mua</button>
    </div>

</div>

<!-- Popup QR -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h3>Quét mã thanh toán</h3>
        <img src="https://via.placeholder.com/200">
        <p id="content"></p>
        <button onclick="closeQR()">Đóng</button>
    </div>
</div>

<script>
function showQR(product) {
    document.getElementById("popup").style.display = "block";
    document.getElementById("content").innerText = "Nội dung: " + product;
}

function closeQR() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>

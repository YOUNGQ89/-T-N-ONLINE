<!DOCTYPE html>
<html>
<head>
    <title>CHẠY ĐƠN SHOPEE</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: orange;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .top-btn {
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .balance {
            margin-top: 5px;
        }

        button {
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .product {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        /* popup */
        .popup {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        .popup-content {
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        img {
            width: 200px;
        }
    </style>
</head>

<body>

<header>
    💰CHẠY ĐƠN SHOPEE
    <div class="balance">Số dư: <span id="balance">0</span> VNĐ</div>

    <div class="top-btn">
        <button onclick="showLogin()">Đăng nhập</button>
    </div>
</header>

<div class="container">
    <div class="product">
        <h3>Đơn 100K</h3>
        <p>Hoa hồng: 600K</p>
        <button onclick="buy('Đơn 100K',600000)">Mua</button>
    </div>

    <div class="product">
        <h3>Đơn 200K</h3>
        <p>Hoa hồng: 1.000K</p>
        <button onclick="buy('Đơn 200K',1000000)">Mua</button>
    </div>

    <div class="product">
        <h3>Đơn 500K</h3>
        <p>Hoa hồng: 2.000K</p>
        <button onclick="buy('Đơn 500K',2000000)">Mua</button>
    </div>
</div>

<!-- QR -->
<div class="popup" id="qr">
    <div class="popup-content">
        <h3>Quét mã thanh toán</h3>
        <img src="https://via.placeholder.com/200">
        <p id="nd"></p>
        <button onclick="closeQR()">Đóng</button>
    </div>
</div>

<!-- Login -->
<div class="popup" id="login">
    <div class="popup-content">
        <h3>Đăng nhập</h3>
        <input id="user" placeholder="Tài khoản">
        <input id="pass" type="password" placeholder="Mật khẩu">
        <button onclick="login()">Đăng nhập</button>
        <p onclick="showRegister()" style="color:blue;cursor:pointer">Chưa có tài khoản?</p>
    </div>
</div>

<!-- Register -->
<div class="popup" id="register">
    <div class="popup-content">
        <h3>Đăng ký</h3>
        <input id="newuser" placeholder="Tài khoản">
        <input id="newpass" type="password" placeholder="Mật khẩu">
        <button onclick="register()">Đăng ký</button>
    </div>
</div>

<script>
let balance = localStorage.getItem("balance") || 0;
document.getElementById("balance").innerText = balance;

function buy(product, money){
    document.getElementById("qr").style.display="block";
    document.getElementById("nd").innerText="Nội dung: " + product;

    // cộng tiền luôn (giả lập)
    balance = parseInt(balance) + money;
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
}

function closeQR(){
    document.getElementById("qr").style.display="none";
}

// login/register
function showLogin(){
    document.getElementById("login").style.display="block";
}

function showRegister(){
    document.getElementById("login").style.display="none";
    document.getElementById("register").style.display="block";
}

function register(){
    let u = document.getElementById("newuser").value;
    let p = document.getElementById("newpass").value;

    if(u === "" || p === ""){
        alert("Nhập đầy đủ!");
        return;
    }

    localStorage.setItem("user", u);
    localStorage.setItem("pass", p);
    localStorage.setItem("balance", 0);

    alert("Đăng ký thành công");
    document.getElementById("register").style.display="none";
}

function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u == localStorage.getItem("user") && p == localStorage.getItem("pass")){
        alert("Đăng nhập thành công 😎");
        document.getElementById("login").style.display="none";
    }else{
        alert("Sai tài khoản!");
    }
}
</script>

</body>
</html>
